<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>Reset your TradeSylla password</title></head>
<body style="margin:0;padding:0;background:#0a0b0f;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0b0f;padding:40px 0;">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#16181f;border-radius:16px;border:1px solid #1e2030;overflow:hidden;">
        <tr>
          <td style="padding:32px 40px 24px;border-bottom:1px solid #1e2030;background:linear-gradient(135deg,rgba(108,99,255,0.08),rgba(0,212,170,0.04));">
            <span style="color:#f0f0f5;font-weight:800;font-size:18px;letter-spacing:1px;">TRADE</span><span style="color:#6c63ff;font-weight:800;font-size:18px;letter-spacing:1px;">SYLLA</span>
          </td>
        </tr>
        <tr>
          <td style="padding:40px;">
            <h1 style="margin:0 0 8px;font-size:24px;font-weight:800;color:#f0f0f5;">Reset your password</h1>
            <p style="margin:0 0 28px;font-size:15px;color:#8b8d9e;line-height:1.6;">
              We received a request to reset your TradeSylla password. Click the button below to set a new one.
            </p>
            <table cellpadding="0" cellspacing="0">
              <tr>
                <td style="border-radius:12px;background:linear-gradient(135deg,#6c63ff,#00d4aa);">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;color:#fff;font-size:15px;font-weight:700;text-decoration:none;border-radius:12px;">
                    Reset Password →
                  </a>
                </td>
              </tr>
            </table>
            <p style="margin:24px 0 0;font-size:13px;color:#4a4c5e;">
              This link expires in 1 hour. If you didn't request a password reset, ignore this email — your account is safe.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:20px 40px;border-top:1px solid #1e2030;">
            <p style="margin:0;font-size:12px;color:#4a4c5e;text-align:center;">© 2025 TradeSylla</p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
